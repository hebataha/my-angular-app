<form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-5">
        <h4 class="my-4 text-capitalize">personal information</h4>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Name</label>
            <input
                type="email"
                class="form-control"
                id="exampleInputEmail1"
                aria-describedby="emailHelp"
                formControlName="name"
            >
            @if(form.controls.name.touched && form.controls.name.errors?.["required"]){
          <p class="text-danger">filed is required</p>
            }
                 @if(form.controls.name.touched && form.controls.name.errors?.["minlength"]){
          <p class="text-danger">min length is 4</p>
            }

            
        </div>
   <h1> NAME: {{form.value | json}}</h1>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Address</label>
            <input type="text" class="form-control" id="exampleInputPassword1" formControlName="address">
        </div>
    </div>
    <hr>
    <div class="mb-5" formGroupName="product">
        <h4 class="my-4 text-capitalize"> product details</h4>
        <div class="mb-3" >
            <label for="exampleInputEmail1" class="form-label"> product Name</label>
            <input
                type="text"
                class="form-control"
                id="exampleInputEmail1"
                aria-describedby="emailHelp"
                formControlName="proName"
            >
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">product Quantity</label>
            <input type="number" class="form-control" id="exampleInputPassword1" formControlName="proQuantity"
>
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword2" class="form-label">product Price</label>
            <input type="number" class="form-control" id="exampleInputPassword2" formControlName="proPrice">
        </div>
    </div>
    <hr>
    <div class="mb-5">
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Notes</label>
            <textarea class="form-control"  rows="3" formControlName="notes" placeholder="add your notes"></textarea>
        </div>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Submit</button>
</form>
