<div class="reserved-dials">
  <div class="header">
    <h3>Choose From Reserved Dials</h3>
    <span class="reserve-link">Reserve Dial</span>
  </div>

  <div class="grid">
    <!-- Card 1 (Selected + SIM input) -->
    <div class="dial-card active">
      <div class="top">
        <div class="number">01112235521</div>
        <input type="checkbox" checked />
      </div>
      <div class="meta">B2B Pool | Golden | 12344</div>

      <div class="sim-box">
        <input type="text" placeholder="Enter SIM Serial Number" />
        <button>Apply</button>
      </div>
    </div>

    <!-- باقي الكروت -->
    <div class="dial-card" *ngFor="let item of [1,2,3,4,5]">
      <div class="top">
        <div class="number">01112235521</div>
        <input type="checkbox" />
      </div>
      <div class="meta">B2B Pool | Golden | 12344</div>
    </div>
  </div>
</div>
