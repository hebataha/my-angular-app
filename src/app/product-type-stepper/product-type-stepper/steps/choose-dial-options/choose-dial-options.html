  <div class="reserved-dials-header">
  <h3 class="title">Choose From Reserved Dials</h3>

</div>
<div class="dials-container">

  <div class="column">

      <div class="wrapper">

            <span class="phone-number">01112235521</span>
            <span class="pool-info">B2B Pool | Golden | 12344</span>
          </div>
          <input type="checkbox" [(ngModel)]="dial1" (change)="inputNumber(1112235521)">

        @if(dial1){
