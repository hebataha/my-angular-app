<div class="plans-container">
    <!-- Select Dial -->
    <div class="dial-select">
        <label>Select Dial</label>

            <select>
                <option>0222679258</option>
                <option>0223456789</option>
                <option>0221112233</option>
            </select>
            <span class="arrow">&#9662;</span>
        </div>
    </div>

    <div class="plans-grid">
        <!-- Card -->
        <label class="plan-card">
            <input type="radio" name="plan" checked>
            <div class="card-content">

                    <img src="images/etisalat-and-logo.svg" alt="logo">
                    <span class="radio"></span>
                </div>

                    <li>Free Calls</li>

                </ul>

        </label>
        <!-- Card -->
        <label class="plan-card">
            <input type="radio" name="plan">
            <div class="card-content">
                <div class="card-header">
                    <img src="images/etisalat-and-logo.svg" alt="logo">
                    <span class="radio"></span>
                </div>
                <h3>Standard Plan</h3>
                <ul>
                    <li>Unlimited Calls</li>
                    <li>20 GB Internet</li>
                </ul>
                <a href="#" class="explore">Explore More</a>
            </div>
        </label>
        <!-- Card -->
        <label class="plan-card">
            <input type="radio" name="plan">
            <div class="card-content">
                <div class="card-header">
                    <img src="images/etisalat-and-logo.svg" alt="logo">
                    <span class="radio"></span>
                </div>
                <h3>Premium Plan</h3>
                <ul>
                    <li>Unlimited Calls</li>
                    <li>50 GB Internet</li>
                </ul>
                <a href="#" class="explore">Explore More</a>

        </label>
        <!-- Card -->
        <label class="plan-card">
            <input type="radio" name="plan">
            <div class="card-content">
                <div class="card-header">
                    <img src="images/etisalat-and-logo.svg" alt="logo">
                    <span class="radio"></span>
                </div>
                <h3>Pro Plan</h3>
                <ul>
                    <li>Unlimited Calls</li>
                    <li>100 GB Internet</li>
                </ul>
                <a href="#" class="explore">Explore More</a>
            </div>

</div>
