<section class="radio-settings">
  <div class="radio-group">
    <h3 class="group-title">Contract Language</h3>
    <div class="options">
      <label class="custom-radio">
        <input type="radio" name="language" value="arabic">
        <span class="radio-mark"></span>
        Arabic
      </label>
      <label class="custom-radio">
        <input type="radio" name="language" value="english" checked>
        <span class="radio-mark"></span>
        English
      </label>
    </div>
  </div>

  <div class="radio-group">
    <h3 class="group-title">Send Bill To</h3>
    <div class="options">
      <label class="custom-radio">
        <input type="radio" name="bill-to" value="home">
        <span class="radio-mark"></span>
        Home
      </label>
      <label class="custom-radio">
        <input type="radio" name="bill-to" value="company" checked>
        <span class="radio-mark"></span>
        Company
      </label>
      <label class="custom-radio">
        <input type="radio" name="bill-to" value="other">
        <span class="radio-mark"></span>
        Other
      </label>
    </div>
  </div>
</section>
