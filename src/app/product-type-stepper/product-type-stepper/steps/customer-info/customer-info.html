<section class="form-container">
    <h2 class="form-title">Customer Information</h2>
    <form class="info-grid">
        <div class="field-group">
            <label for="nationality">Nationality</label>
            <select id="nationality">
                <option>Egyptian</option>
            </select>
        </div>
        <div class="field-group">
            <label for="title">Title</label>
            <select id="title">
                <option>MR.</option>
            </select>
        </div>
        <div class="empty-space"></div>
        <div class="field-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" value="Amina">
        </div>
        <div class="field-group">
            <label for="middle-name">Middle Name</label>
            <input type="text" id="middle-name" value="Osama">
        </div>
        <div class="field-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" value="Ahmed">
        </div>
        <div class="field-group">
            <label for="phone">Telephone Number</label>
            <input type="tel" id="phone" value="01123347689">
        </div>
        <div class="field-group">
            <label for="dob">Birth Date</label>
            <div class="input-wrapper">
                <input type="date" value="05 / 12 / 2025">
            </div>
        </div>
        <div class="field-group">
            <label for="group">Customer Group</label>
            <select id="group">
                <option>Consumer</option>
            </select>
        </div>
        <div class="field-group">
            <label for="email">E-Mail</label>
            <input type="email" id="email" value="Abdelrahman@gmail.com">
        </div>
        <div class="field-group">
            <label for="trade">Trade</label>
            <select id="trade">
                <option>Consumer Services</option>
            </select>
        </div>
        <div class="field-group">
            <label for="search-code">Search Code</label>
            <select id="search-code">
                <option>Consumer Services</option>
            </select>
        </div>
    </form>
</section>
