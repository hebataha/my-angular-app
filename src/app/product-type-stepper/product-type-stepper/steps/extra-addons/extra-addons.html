<div class="addons-container">
  <!-- Header -->
  <div class="header">
    <div class="dial-select">
      <label>Extra Addons</label>
      <select>
        <option>0222679258</option>
      </select>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-header">
      <h3>Ppt Add-On</h3>
      <span>Bundle addons</span>
    </div>

    <!-- Form Grid -->
    <div class="form-grid">
      <div class="form-group">
        <label>Company Code</label>
        <select>
          <option>E& code</option>
        </select>
      </div>

      <div class="form-group">
        <label>Dial Pattern</label>
        <input type="text" value="Strat with 1345" />
      </div>

      <div class="form-group">
        <label>Company Profile</label>
        <select>
          <option>Golden</option>
        </select>
      </div>

      <div class="form-group">
        <label>Bank Code</label>
        <input type="text" value="123455" />
      </div>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn-outline">Clear</button>
      <button class="btn-primary">Submit</button>
    </div>
  </div>

  <!-- Toggle Options -->
  <div class="toggle-list">
    <label class="toggle-item">
      <span>Flous Service</span>
      <input type="checkbox" />
      <span class="checkmark"></span>
    </label>

    <label class="toggle-item">
      <span>Snipper Addons</span>
      <input type="checkbox" />
      <span class="checkmark"></span>
    </label>
  </div>
</div>
