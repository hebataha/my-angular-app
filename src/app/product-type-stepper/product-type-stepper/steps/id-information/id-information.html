<div class="form-container">

<div class="customer-info">
  <h2>Customer Information</h2>

  <form class="customer-form">
    <div class="form-group">
      <label for="nationality">Nationality</label>
      <select id="nationality">
        <option>Egyptian</option>
      </select>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <select id="title">
        <option>MR.</option>

    </div>

    <div class="form-group">
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" value="Amina" />
    </div>

    <div class="form-group">
      <label for="middleName">Middle Name</label>
      <input id="middleName" type="text" value="Osama" />
    </div>

    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" value="Ahmed" />
    </div>

    <div class="form-group">
      <label for="telephone">Telephone Number</label>
      <input id="telephone" type="text" value="01123347689" />
    </div>

    <div class="form-group date-field">
      <label for="birthDate">Birth Date</label>
      <div class="input-icon">
        <input id="birthDate" type="text" value="15 / 12 / 1995" />
        <span class="icon">📅</span>
      </div>
    </div>

    <div class="form-group">
      <label for="customerGroup">Customer Group</label>
      <select id="customerGroup">
        <option>Consumer</option>
      </select>
    </div>

    <div class="form-group">
      <label for="email">E-Mail</label>
      <input id="email" type="email" value="Abdelrahman@gmail.com" />
    </div>

    <div class="form-group">
      <label for="trade">Trade</label>
      <select id="trade">
        <option>Consumer Services</option>
      </select>
    </div>

    <div class="form-group">
      <label for="searchCode">Search Code</label>
      <select id="searchCode">
        <option>Consumer Services</option>
      </select>
    </div>
  </form>
</div>
