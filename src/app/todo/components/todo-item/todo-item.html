<div class="container">
    <div class="todo d-flex flex-column gap-3 mt-3">
        <div class="d-flex justify-content-between align-items-center todo-details">
            <div class="todo__data">
                <h4 class="mb-0"> {{item.title | json}} </h4>
            </div>
            <div class="todo__actions d-flex gap-3">
                <button matButton="outlined" matButton="tonal">edit</button>
                <button matButton="outlined" matButton="elevated">delete</button>
            </div>
        </div>
    </div>
</div>
