<div class="container">
    <button matButton="outlined" routerLink="/" >back to home</button>
</div>
<div class="">
    <div classs="row">
        <div class="col-lg-6">
            <div class="container my-5 todo-wrapper offset-lg-6">
                <mat-form-field class="w-100">
                    <mat-label>add OR search task</mat-label>
                    <input
                        type="search"
                        class="w-100"
                        matInput
                        placeholder="add task"
                        [(ngModel)]="inputTask"
                       
                    >
                </mat-form-field>
                <button (click)="addTodo()" class="btn-primary btn">ADD</button>
                <button (click)="valInput()" class="btn-secondary btn mx-2">Search</button>

                <!-- 
                <app-todo-item></app-todo-item>
                <app-todo-item></app-todo-item> -->


            </div>
            <!-- <h1> {{inputTask}}</h1> -->
           
            @for (item of todoArray; track $index) {
             <app-todo-item [item]="item"> </app-todo-item>
            }
            
            <!-- @empty {
              <div class="container">
                  <h1>No Available TODo</h1>
              </div>

            } -->
           
        </div>
    </div>
</div>
