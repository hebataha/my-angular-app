<div class="container ">
  <button matButton="outlined" routerLink="/">back to home</button>
</div>
<div class>
  <div classs="row">
              {{inputTask}}

    <div class="col-lg-6">
      <div class="container my-5 todo-wrapper offset-lg-6">
        <mat-form-field class="w-100">
          <mat-label>add OR search task</mat-label>
          <input type="search" class="w-100" matInput placeholder="add task" (change)="checkInp()"
            [(ngModel)]="inputTask">
        </mat-form-field>
        <button (click)="addTodo()" class="btn-primary btn" [disabled]="inputTask == ''">ADD</button>
        <button (click)="valInput()" class="btn-secondary btn mx-2" [disabled]="inputTask == ''"
          [ngClass]="{'disabled': todoArray.length <= 1}">Search</button>
          @if(showEdit){
          <button class="btn btn-danger"  (click)="update()">update</button>
          }
        <!--
                <app-todo-item></app-todo-item>
                <app-todo-item></app-todo-item> -->

      </div>
      <!-- <div class="container offset-lg-6">
        <h1>{{searchResult}}</h1>
      </div> -->
      <div class="container offset-lg-6">
        <h4 class="text-capitalize"> {{todoArray.length ? ` todo items count : ${todoArray.length}` : ""}} </h4>
        @if(todoArray.length === 0){
        <h3 class="">No todos Available !</h3>
        }
      </div>
      <!-- <h1> {{inputTask}}</h1> -->
      @for (item of todoArray; track $index) {
      <!-- <h1>{{item.title| json}}</h1> -->
      @if (item.title !== "") {
      <app-todo-item [item]="item"
      (itemTodo) = "handleTitle($event)"
      (deleteItem)="deleteItem($event)"
      [listArray]="todoArray"
      (click)="handleTitle(item)"
      > </app-todo-item> } }
    </div>
  </div>
</div>
